name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      # INSTALL ROOT WORKSPACE
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile=false

      # INSTALL FRONTEND PACKAGE DIRECTLY
      - name: Install frontend dependencies
        run: |
          cd artifacts/eaglercraft
          npm install

      # BUILD FRONTEND
      - name: Build frontend
        run: |
          cd artifacts/eaglercraft
          npx vite build --config vite.config.ts

      # PREPARE PAGES
      - name: Prepare Pages folder
        run: |
          rm -rf pages
          mkdir pages
          cp -r artifacts/eaglercraft/dist/. pages/

      # UPLOAD
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
