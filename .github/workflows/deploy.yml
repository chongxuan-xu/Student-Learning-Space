name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      # INSTALL AT ROOT (IMPORTANT)
      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile=false

      # BUILD ONLY FRONTEND PACKAGE
      - name: Build frontend
        run: pnpm --filter "./artifacts/eaglercraft" install

      - name: Build project
        run: pnpm --filter "./artifacts/eaglercraft" build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifacts/eaglercraft/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
